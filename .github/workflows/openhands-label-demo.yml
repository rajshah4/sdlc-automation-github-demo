name: OpenHands Label Demo

on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled, ready_for_review]
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  deterministic-preflight:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.label.name || '', 'openhands') ||
      contains(github.event.comment.body || '', 'openhands-')
    steps:
      - uses: actions/checkout@v4

      - name: Validate demo package without LLM calls
        run: python3 scripts/preflight_github_demo.py --offline

      - name: Write demo summary
        run: |
          {
            echo "## SDLC Automation Demo signal"
            echo ""
            echo "- Event: ${{ github.event_name }}"
            echo "- Action: ${{ github.event.action || 'manual' }}"
            echo "- Label: ${{ github.event.label.name || 'n/a' }}"
            echo ""
            echo "This workflow proves the same labels can drive GitHub Actions while OpenHands Automations handle the agentic work through event triggers."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Acknowledge manual label/comment trigger
        if: github.event_name == 'issues' || github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            if (!issue) return;
            const body = [
              "SDLC Automation Demo preflight saw this OpenHands signal.",
              "",
              "- GitHub Actions path: deterministic preflight completed.",
              "- OpenHands Automations path: event-triggered automation should pick up the same label/comment when registered.",
              "- Human control: this workflow does not merge PRs or mutate cloud resources."
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body
            });

